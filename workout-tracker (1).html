<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lift Log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424; --border: #2e2e2e;
    --accent: #c8f135; --accent-dim: rgba(200,241,53,0.12); --text: #f0f0f0;
    --muted: #888; --danger: #ff4d4d; --info: #4db8ff; --info-dim: rgba(77,184,255,0.12);
    --warn: #ffaa33; --warn-dim: rgba(255,170,51,0.12);
    --font-display: 'Bebas Neue', sans-serif; --font-body: 'Inter', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; padding: 0 0 80px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px 12px; position: sticky; top: 0; z-index: 10; }
  header h1 { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 0.04em; color: var(--accent); line-height: 1; }
  .header-sub { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  header p { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .week-badge { font-size: 0.72rem; background: var(--warn-dim); border: 1px solid var(--warn); color: var(--warn); padding: 2px 10px; border-radius: 99px; font-weight: 600; }
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 24px; }
  .tab { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.06em; padding: 10px 0; margin-right: 28px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; background: none; border-top: none; border-left: none; border-right: none; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .view { display: none; padding: 20px 24px; }
  .view.active { display: block; }

  /* PROGRAM OVERVIEW */
  .program-band { background: var(--warn-dim); border: 1px solid rgba(255,170,51,0.25); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
  .program-band-title { font-family: var(--font-display); font-size: 1rem; letter-spacing: 0.06em; color: var(--warn); margin-bottom: 6px; }
  .week-dots { display: flex; gap: 8px; }
  .week-dot { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .week-dot.current { border-color: var(--warn); background: var(--warn); color: #000; }
  .week-dot.done { border-color: var(--accent); color: var(--accent); }

  .workout-selector { display: flex; gap: 10px; margin-bottom: 20px; }
  .workout-btn { flex: 1; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: var(--font-display); font-size: 1.3rem; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; text-align: center; }
  .workout-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .workout-btn small { display: block; font-family: var(--font-body); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; opacity: 0.7; }
  .date-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .date-row label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); white-space: nowrap; }
  .date-row input[type="date"] { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; padding: 8px 12px; flex: 1; color-scheme: dark; }
  .exercise-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
  .exercise-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .exercise-name { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.05em; color: var(--text); }
  .exercise-meta { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; text-align: right; }
  .last-session { font-size: 0.7rem; color: var(--muted); padding: 6px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .last-session span { color: var(--accent); font-weight: 600; }
  .suggestion-bar { font-size: 0.72rem; color: var(--info); padding: 7px 16px; background: var(--info-dim); border-bottom: 1px solid rgba(77,184,255,0.2); display: flex; align-items: flex-start; gap: 6px; }
  .sets-area { padding: 12px 16px; }
  .set-header { display: grid; grid-template-columns: 32px 1fr 1fr 28px; gap: 8px; margin-bottom: 4px; }
  .set-header span { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; text-align: center; }
  .set-row { display: grid; grid-template-columns: 32px 1fr 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
  .set-num { font-size: 0.72rem; color: var(--muted); text-align: center; font-weight: 600; }
  .set-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font-body); font-size: 0.9rem; padding: 8px 10px; width: 100%; text-align: center; transition: border-color 0.2s; }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input::placeholder { color: var(--muted); font-size: 0.75rem; }
  .set-done { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: var(--muted); font-size: 0.9rem; }
  .set-done.checked { background: var(--accent); border-color: var(--accent); color: #000; }
  .save-btn { width: 100%; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: var(--font-display); font-size: 1.4rem; letter-spacing: 0.08em; cursor: pointer; margin-top: 20px; transition: opacity 0.2s; }
  .save-btn:hover { opacity: 0.9; }
  .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ROTATION PREVIEW */
  .rotation-preview { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
  .rotation-preview-header { padding: 10px 16px; border-bottom: 1px solid var(--border); font-family: var(--font-display); font-size: 0.95rem; letter-spacing: 0.06em; color: var(--warn); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .rotation-preview-body { padding: 12px 16px; display: none; }
  .rotation-preview-body.open { display: block; }
  .rotation-week { margin-bottom: 10px; }
  .rotation-week-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
  .rotation-week-label.current-week { color: var(--warn); }
  .rotation-row { font-size: 0.78rem; color: var(--text); margin-bottom: 2px; }
  .rotation-row span { color: var(--muted); }

  /* AI PANEL */
  .ai-panel { background: var(--surface); border: 1px solid rgba(77,184,255,0.3); border-radius: 10px; margin-top: 20px; overflow: hidden; }
  .ai-panel-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--info-dim); }
  .ai-panel-header div h3 { font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.06em; color: var(--info); }
  .ai-panel-header div p { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
  .ai-panel-body { padding: 16px; }
  .ai-loading { display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.85rem; padding: 8px 0; }
  .ai-loading .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--info); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-suggestion-item { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .ai-suggestion-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .ai-suggestion-item .ex-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.09em; color: var(--accent); margin-bottom: 4px; font-weight: 600; }
  .ai-suggestion-item .suggestion-text { font-size: 0.85rem; color: var(--text); line-height: 1.5; }
  .ai-error { color: var(--danger); font-size: 0.82rem; padding: 8px 0; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: #000; padding: 12px 24px; border-radius: 999px; font-weight: 600; font-size: 0.85rem; transition: transform 0.3s ease; z-index: 100; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* PROGRESS */
  .exercise-picker { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .ex-pick-btn { padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: var(--font-body); font-size: 0.85rem; cursor: pointer; text-align: left; transition: all 0.2s; display: flex; align-items: center; justify-content: space-between; }
  .ex-pick-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--text); }
  .ex-pick-btn .tag { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); background: var(--accent-dim); padding: 2px 7px; border-radius: 99px; }
  .chart-container { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .chart-title { font-family: var(--font-display); font-size: 1.2rem; letter-spacing: 0.05em; margin-bottom: 2px; }
  .chart-subtitle { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
  .pb-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); font-size: 0.75rem; font-weight: 600; padding: 4px 12px; border-radius: 99px; margin-bottom: 12px; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .history-table th { text-align: left; color: var(--muted); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .history-table td { padding: 8px 0; border-bottom: 1px solid var(--border); color: var(--text); }
  .history-table td:last-child { text-align: right; color: var(--muted); }
  .no-data { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.85rem; }
  .no-data strong { display: block; font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }
  .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; margin-top: 4px; }
  .prog-filter { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .prog-filter button { padding: 5px 12px; border-radius: 99px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 0.75rem; cursor: pointer; transition: all 0.2s; }
  .prog-filter button.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
</style>
</head>
<body>

<header>
  <h1>Lift Log</h1>
  <div class="header-sub">
    <p>Progressive Overload Tracker</p>
    <div class="week-badge" id="header-week-badge">Week 1 of 4</div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('log')">Log</button>
  <button class="tab" onclick="switchTab('progress')">Progress</button>
  <button class="tab" onclick="switchTab('program')">Program</button>
</div>

<div id="view-log" class="view active">
  <div class="program-band">
    <div class="program-band-title">4-WEEK ROTATION</div>
    <div class="week-dots" id="week-dots"></div>
  </div>
  <div class="workout-selector">
    <button class="workout-btn active" id="btn-a" onclick="selectWorkout('A')">WORKOUT A<small>Saturday</small></button>
    <button class="workout-btn" id="btn-b" onclick="selectWorkout('B')">WORKOUT B<small>Wednesday</small></button>
  </div>
  <div class="date-row">
    <label>Date</label>
    <input type="date" id="session-date">
  </div>
  <div id="exercises-container"></div>
  <button class="save-btn" id="save-btn" onclick="saveSession()">SAVE SESSION</button>
  <div id="ai-panel-container"></div>
</div>

<div id="view-progress" class="view">
  <div class="section-label">Filter</div>
  <div class="prog-filter" id="prog-filter"></div>
  <div class="exercise-picker" id="exercise-picker"></div>
  <div id="progress-detail"></div>
</div>

<div id="view-program" class="view">
  <div id="program-overview"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── EXERCISE LIBRARY ────────────────────────────────────────────────────────
// 4 blocks × 2 workouts. Each block runs for 4 weeks.
// Structure: block 0=weeks 1-4, block 1=weeks 5-8, block 2=weeks 9-12, block 3=weeks 13-16
const BLOCKS = [
  // BLOCK 1 — Foundation
  {
    label: "Block 1: Foundation",
    weeks: "Weeks 1–4",
    A: [
      { name: "Goblet Squat", category: "Squat", sets: 3, reps: 6 },
      { name: "Dumbbell Bench Press", category: "Push", sets: 3, reps: 6 },
      { name: "Reverse Lunge", category: "Single Leg", sets: 3, reps: 6, perSide: true },
      { name: "Lat Pulldown", category: "Pull", sets: 3, reps: 6 },
      { name: "Romanian Deadlift (DB)", category: "Bend", sets: 3, reps: 10 },
      { name: "Dumbbell Curls", category: "Arms", sets: 3, reps: null, toFailure: true },
      { name: "Deadbugs", category: "Core", sets: 3, reps: null, toFailure: true },
    ],
    B: [
      { name: "Hip Thrusts", category: "Bend", sets: 3, reps: 6 },
      { name: "Single Arm DB Row", category: "Pull", sets: 3, reps: 6 },
      { name: "Leg Press", category: "Squat", sets: 3, reps: 6 },
      { name: "Overhead Press (DB)", category: "Push", sets: 3, reps: 6 },
      { name: "Split Squat", category: "Single Leg", sets: 3, reps: 10, perSide: true },
      { name: "Tricep Extensions (DB)", category: "Arms", sets: 3, reps: null, toFailure: true },
      { name: "Knee Raises", category: "Core", sets: 3, reps: null, toFailure: true },
    ]
  },
  // BLOCK 2 — Build
  {
    label: "Block 2: Build",
    weeks: "Weeks 5–8",
    A: [
      { name: "Back Squat", category: "Squat", sets: 3, reps: 6 },
      { name: "Bench Press (BB)", category: "Push", sets: 3, reps: 6 },
      { name: "Staggered Stance RDL (DB)", category: "Single Leg", sets: 3, reps: 8, perSide: true },
      { name: "Row (Barbell)", category: "Pull", sets: 3, reps: 6 },
      { name: "Deadlift (Bar)", category: "Bend", sets: 3, reps: 6 },
      { name: "Cable Curls", category: "Arms", sets: 3, reps: null, toFailure: true },
      { name: "Sit Ups", category: "Core", sets: 3, reps: null, toFailure: true },
    ],
    B: [
      { name: "Romanian Deadlift (Bar)", category: "Bend", sets: 3, reps: 8 },
      { name: "Row (Cable)", category: "Pull", sets: 3, reps: 8 },
      { name: "Box Squat (BB)", category: "Squat", sets: 3, reps: 6 },
      { name: "Overhead Press (BB)", category: "Push", sets: 3, reps: 6 },
      { name: "Step Ups", category: "Single Leg", sets: 3, reps: 10, perSide: true },
      { name: "Tricep Extensions (Cable)", category: "Arms", sets: 3, reps: null, toFailure: true },
      { name: "Crunch", category: "Core", sets: 3, reps: null, toFailure: true },
    ]
  },
  // BLOCK 3 — Strength
  {
    label: "Block 3: Strength",
    weeks: "Weeks 9–12",
    A: [
      { name: "Back Squat", category: "Squat", sets: 4, reps: 5 },
      { name: "Bench Press (DB)", category: "Push", sets: 4, reps: 5 },
      { name: "Forward Lunge", category: "Single Leg", sets: 3, reps: 8, perSide: true },
      { name: "Lat Pulldown", category: "Pull", sets: 4, reps: 6 },
      { name: "Deadlift (KB)", category: "Bend", sets: 4, reps: 6 },
      { name: "Barbell Curls", category: "Arms", sets: 3, reps: null, toFailure: true },
      { name: "Carries", category: "Core", sets: 3, reps: null, toFailure: true },
    ],
    B: [
      { name: "Hip Thrusts", category: "Bend", sets: 4, reps: 6 },
      { name: "Single Arm Row (Cable)", category: "Pull", sets: 4, reps: 6 },
      { name: "Leg Press", category: "Squat", sets: 4, reps: 8 },
      { name: "Overhead Press (Machine)", category: "Push", sets: 4, reps: 6 },
      { name: "Staggered Stance RDL (Cable)", category: "Single Leg", sets: 3, reps: 8, perSide: true },
      { name: "Tricep Extensions (BB)", category: "Arms", sets: 3, reps: null, toFailure: true },
      { name: "Deadbugs", category: "Core", sets: 3, reps: null, toFailure: true },
    ]
  },
  // BLOCK 4 — Power & Variety
  {
    label: "Block 4: Power & Variety",
    weeks: "Weeks 13–16",
    A: [
      { name: "Box Squat (DB)", category: "Squat", sets: 4, reps: 5 },
      { name: "Bench Press (Machine)", category: "Push", sets: 3, reps: 8 },
      { name: "Step Ups", category: "Single Leg", sets: 3, reps: 10, perSide: true },
      { name: "Row (Machine)", category: "Pull", sets: 4, reps: 6 },
      { name: "Romanian Deadlift (DB)", category: "Bend", sets: 4, reps: 8 },
      { name: "Cable Curls", category: "Arms", sets: 3, reps: null, toFailure: true },
      { name: "Knee Raises", category: "Core", sets: 3, reps: null, toFailure: true },
    ],
    B: [
      { name: "Hip Thrusts", category: "Bend", sets: 4, reps: 8 },
      { name: "Single Arm Row (Machine)", category: "Pull", sets: 3, reps: 8 },
      { name: "Goblet Squat", category: "Squat", sets: 3, reps: 10 },
      { name: "Overhead Press (DB)", category: "Push", sets: 3, reps: 8 },
      { name: "Staggered Stance RDL (DB)", category: "Single Leg", sets: 4, reps: 8, perSide: true },
      { name: "Tricep Extensions (DB)", category: "Arms", sets: 3, reps: null, toFailure: true },
      { name: "Sit Ups", category: "Core", sets: 3, reps: null, toFailure: true },
    ]
  }
];

// All unique exercise names across all blocks (for progress tracking)
function getAllExercises() {
  const seen = new Set();
  const all = [];
  BLOCKS.forEach(b => {
    [...b.A, ...b.B].forEach(ex => {
      if (!seen.has(ex.name)) { seen.add(ex.name); all.push(ex); }
    });
  });
  return all;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentWorkout = 'A';
let selectedExercise = null;
let progressFilter = 'All';
let sessions = JSON.parse(localStorage.getItem('liftlog_sessions') || '[]');
let savedSuggestions = JSON.parse(localStorage.getItem('liftlog_suggestions') || '{}');
// programStart: ISO date string when the program started (set on first save if not set)
let programStart = localStorage.getItem('liftlog_start') || null;

function saveSessions() { localStorage.setItem('liftlog_sessions', JSON.stringify(sessions)); }
function storeSuggestions() { localStorage.setItem('liftlog_suggestions', JSON.stringify(savedSuggestions)); }

// ─── WEEK / BLOCK LOGIC ──────────────────────────────────────────────────────
function getCurrentWeek() {
  if (!programStart) return 1;
  const start = new Date(programStart);
  const now = new Date();
  const diffDays = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  return Math.min(Math.floor(diffDays / 7) + 1, 16);
}

function getBlockIndex(week) {
  return Math.min(Math.floor((week - 1) / 4), 3);
}

function getCurrentBlock() {
  return BLOCKS[getBlockIndex(getCurrentWeek())];
}

function getBlockForWeek(week) {
  return BLOCKS[getBlockIndex(week)];
}

// ─── INIT ────────────────────────────────────────────────────────────────────
document.getElementById('session-date').value = new Date().toISOString().split('T')[0];
renderWeekDots();
renderWeekBadge();
renderExercises();

function renderWeekBadge() {
  const week = getCurrentWeek();
  const blockIdx = getBlockIndex(week);
  document.getElementById('header-week-badge').textContent = `Week ${week} · ${BLOCKS[blockIdx].label.split(':')[0]}`;
}

function renderWeekDots() {
  const week = getCurrentWeek();
  const container = document.getElementById('week-dots');
  container.innerHTML = '';
  for (let i = 1; i <= 16; i++) {
    const dot = document.createElement('div');
    dot.className = 'week-dot' + (i === week ? ' current' : i < week ? ' done' : '');
    dot.textContent = i;
    dot.title = `Week ${i} — ${getBlockForWeek(i).label}`;
    container.appendChild(dot);
  }
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['log','progress','program'][i] === tab));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'progress') renderProgressPicker();
  if (tab === 'program') renderProgramOverview();
}

function selectWorkout(w) {
  currentWorkout = w;
  document.getElementById('btn-a').classList.toggle('active', w === 'A');
  document.getElementById('btn-b').classList.toggle('active', w === 'B');
  document.getElementById('ai-panel-container').innerHTML = '';
  renderExercises();
}

function getLastSession(exerciseName) {
  const prev = sessions.filter(s => s.exercise === exerciseName);
  return prev.length ? prev[prev.length - 1] : null;
}

function renderExercises() {
  const container = document.getElementById('exercises-container');
  container.innerHTML = '';
  const block = getCurrentBlock();
  const exercises = block[currentWorkout];
  const week = getCurrentWeek();
  const blockIdx = getBlockIndex(week);

  exercises.forEach((ex, idx) => {
    const last = getLastSession(ex.name);
    const suggestion = savedSuggestions[ex.name] || null;
    const repLabel = ex.toFailure ? 'to failure' : `${ex.reps} reps${ex.perSide ? '/side' : ''}`;
    const targetLabel = `${ex.sets} × ${repLabel}`;

    let lastHtml = '';
    if (last) {
      const maxWeight = Math.max(...last.sets.map(s => parseFloat(s.weight) || 0));
      lastHtml = `<div class="last-session">Last: <span>${maxWeight > 0 ? maxWeight + 'kg' : 'BW'}</span> on ${last.date}</div>`;
    }
    let suggestionHtml = suggestion
      ? `<div class="suggestion-bar"><span>🤖</span><span>${suggestion}</span></div>` : '';

    let setsHtml = `<div class="set-header"><span>#</span><span>kg</span><span>reps</span><span></span></div>`;
    for (let i = 1; i <= ex.sets; i++) {
      const lw = last ? (last.sets[i-1]?.weight || '') : '';
      const lr = last ? (last.sets[i-1]?.reps || '') : '';
      setsHtml += `<div class="set-row">
        <div class="set-num">${i}</div>
        <input class="set-input" type="number" placeholder="0" min="0" step="0.5" id="w-${idx}-${i}" value="${lw}">
        <input class="set-input" type="number" placeholder="0" min="0" id="r-${idx}-${i}" value="${lr}">
        <button class="set-done" id="done-${idx}-${i}" onclick="toggleDone(${idx},${i})">✓</button>
      </div>`;
    }

    container.innerHTML += `
      <div class="exercise-card">
        <div class="exercise-header">
          <div>
            <div class="exercise-name">${ex.name}</div>
            <div style="font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:2px">${ex.category}</div>
          </div>
          <div class="exercise-meta">${targetLabel}<br><span style="color:var(--warn);font-size:0.62rem">${block.label.split(':')[1].trim()}</span></div>
        </div>
        ${lastHtml}${suggestionHtml}
        <div class="sets-area">${setsHtml}</div>
      </div>`;
  });
}

function toggleDone(exIdx, setNum) {
  document.getElementById(`done-${exIdx}-${setNum}`).classList.toggle('checked');
}

async function saveSession() {
  const date = document.getElementById('session-date').value;
  const block = getCurrentBlock();
  const exercises = block[currentWorkout];
  const sessionData = [];
  let saved = 0;

  // Set programStart on first ever save
  if (!programStart) {
    programStart = date;
    localStorage.setItem('liftlog_start', programStart);
    renderWeekDots();
    renderWeekBadge();
  }

  exercises.forEach((ex, idx) => {
    const sets = [];
    let hasData = false;
    for (let i = 1; i <= ex.sets; i++) {
      const w = document.getElementById(`w-${idx}-${i}`)?.value;
      const r = document.getElementById(`r-${idx}-${i}`)?.value;
      if (w || r) hasData = true;
      sets.push({ weight: w || '', reps: r || '' });
    }
    if (hasData) {
      const week = getCurrentWeek();
      const blockIdx = getBlockIndex(week);
      sessions.push({ exercise: ex.name, workout: currentWorkout, date, sets, week, block: blockIdx + 1 });
      sessionData.push({ ...ex, sets });
      saved++;
    }
  });

  saveSessions();
  if (saved === 0) { showToast('No data entered to save.'); return; }
  showToast(`Session saved! ${saved} exercises logged.`);

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  await getAISuggestions(sessionData, date, block);
  btn.disabled = false;
}

async function getAISuggestions(sessionData, date, block) {
  const container = document.getElementById('ai-panel-container');
  container.innerHTML = `<div class="ai-panel">
    <div class="ai-panel-header"><div><h3>🤖 Next Session Targets</h3><p>AI coaching based on today's performance</p></div></div>
    <div class="ai-panel-body"><div class="ai-loading"><div class="spinner"></div> Analysing your session...</div></div>
  </div>`;

  const historyContext = sessionData.map(ex => {
    const allSessions = sessions.filter(s => s.exercise === ex.name);
    const recent = allSessions.slice(-4);
    const historyStr = recent.map(s => {
      const maxW = Math.max(...s.sets.map(x => parseFloat(x.weight) || 0));
      const totalR = s.sets.reduce((a, x) => a + (parseInt(x.reps) || 0), 0);
      return `${s.date}: max ${maxW}kg, ${totalR} total reps`;
    }).join(' | ');
    const todaySets = ex.sets.map((s, i) => `Set ${i+1}: ${s.weight||'BW'}kg × ${s.reps||'?'} reps`).join(', ');
    return `${ex.name} (${ex.category}): Today [${todaySets}]. History: ${historyStr || 'first session'}`;
  }).join('\n');

  const week = getCurrentWeek();
  const nextWeek = week + 1;
  const nextBlock = nextWeek <= 16 ? getBlockForWeek(nextWeek) : null;
  const blockChange = nextBlock && getBlockIndex(nextWeek) !== getBlockIndex(week);
  const blockChangeNote = blockChange ? `\nIMPORTANT: Next week starts ${nextBlock.label}. Note any exercise changes that will occur.` : '';

  const prompt = `You are a strength coach. Your athlete follows a 2-day full body program (${block.label}) focused on progressive overload with a glute emphasis. Currently in Week ${week} of 16.${blockChangeNote}

Today's session (${date}):
${historyContext}

For each exercise, give ONE specific, actionable next-session target. Rules:
- Hit all target reps cleanly → add weight (2.5kg lower body, 1-2kg upper body/arms)
- Missed reps → same weight, aim for more reps next time
- First session → give an encouraging starting benchmark
- To-failure sets → aim for 1-2 more reps
- If block is changing next week, briefly mention the new exercise replacing this one
- Max 1 sentence per exercise. Be direct and specific.

Respond ONLY as raw JSON: {"Exercise Name": "suggestion", ...}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] })
    });
    const data = await response.json();
    const raw = data.content.map(c => c.text || '').join('');
    const suggestions = JSON.parse(raw.replace(/```json|```/g, '').trim());
    Object.assign(savedSuggestions, suggestions);
    storeSuggestions();

    const items = Object.entries(suggestions).map(([name, text]) =>
      `<div class="ai-suggestion-item"><div class="ex-label">${name}</div><div class="suggestion-text">${text}</div></div>`
    ).join('');

    container.innerHTML = `<div class="ai-panel">
      <div class="ai-panel-header"><div><h3>🤖 Next Session Targets</h3><p>Shown on each exercise card next session</p></div></div>
      <div class="ai-panel-body">${items}</div>
    </div>`;
  } catch(err) {
    container.querySelector('.ai-panel-body').innerHTML = `<div class="ai-error">Couldn't load suggestions — your session is saved.</div>`;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── PROGRAM OVERVIEW TAB ────────────────────────────────────────────────────
function renderProgramOverview() {
  const week = getCurrentWeek();
  const container = document.getElementById('program-overview');
  let html = '';

  BLOCKS.forEach((block, bi) => {
    const blockWeeks = [bi*4+1, bi*4+2, bi*4+3, bi*4+4];
    const isCurrent = blockWeeks.includes(week);
    html += `<div style="margin-bottom:24px">
      <div style="font-family:var(--font-display);font-size:1.3rem;letter-spacing:0.06em;color:${isCurrent ? 'var(--warn)' : 'var(--muted)'};margin-bottom:2px">${block.label}</div>
      <div style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px">${block.weeks}${isCurrent ? ' · CURRENT' : ''}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        ${['A','B'].map(day => `
          <div style="background:var(--surface);border:1px solid ${isCurrent ? 'rgba(255,170,51,0.3)' : 'var(--border)'};border-radius:8px;padding:12px">
            <div style="font-family:var(--font-display);font-size:0.95rem;letter-spacing:0.06em;color:${isCurrent ? 'var(--accent)' : 'var(--muted)'};margin-bottom:8px">WORKOUT ${day}</div>
            ${block[day].map(ex => `
              <div style="margin-bottom:6px">
                <div style="font-size:0.78rem;color:var(--text)">${ex.name}</div>
                <div style="font-size:0.65rem;color:var(--muted)">${ex.sets}×${ex.toFailure ? 'failure' : ex.reps + (ex.perSide?'/side':'')}</div>
              </div>`).join('')}
          </div>`).join('')}
      </div>
    </div>`;
  });

  container.innerHTML = `<div style="margin-bottom:16px">
    <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:8px">Your Progress</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:0.8rem;color:var(--muted)">Week</span>
        <span style="font-size:0.8rem;color:var(--accent);font-weight:600">${week} of 16</span>
      </div>
      <div style="background:var(--surface2);border-radius:99px;height:6px;overflow:hidden">
        <div style="background:var(--accent);height:100%;width:${(week/16)*100}%;border-radius:99px;transition:width 0.5s"></div>
      </div>
      <div style="font-size:0.72rem;color:var(--muted);margin-top:8px">${BLOCKS[getBlockIndex(week)].label} · ${4-(((week-1)%4))} weeks remaining in block</div>
    </div>
  </div>` + html;
}

// ─── PROGRESS TAB ────────────────────────────────────────────────────────────
function renderProgressPicker() {
  const allEx = getAllExercises();
  const categories = ['All', ...new Set(allEx.map(e => e.category))];

  const filterDiv = document.getElementById('prog-filter');
  filterDiv.innerHTML = categories.map(c =>
    `<button class="${progressFilter === c ? 'active' : ''}" onclick="setProgressFilter('${c}')">${c}</button>`
  ).join('');

  const picker = document.getElementById('exercise-picker');
  picker.innerHTML = '';
  const filtered = progressFilter === 'All' ? allEx : allEx.filter(e => e.category === progressFilter);
  filtered.forEach(ex => {
    const hasSessions = sessions.some(s => s.exercise === ex.name);
    const btn = document.createElement('button');
    btn.className = 'ex-pick-btn' + (selectedExercise === ex.name ? ' active' : '');
    btn.innerHTML = `<span>${ex.name}${!hasSessions ? ' <span style="opacity:0.4;font-size:0.7em">No data</span>' : ''}</span><span class="tag">${ex.category}</span>`;
    btn.onclick = () => { selectedExercise = ex.name; renderProgressPicker(); renderProgress(); };
    picker.appendChild(btn);
  });
  if (selectedExercise) renderProgress();
}

function setProgressFilter(cat) {
  progressFilter = cat;
  renderProgressPicker();
}

function renderProgress() {
  const detail = document.getElementById('progress-detail');
  const data = sessions.filter(s => s.exercise === selectedExercise);
  if (!data.length) {
    detail.innerHTML = `<div class="no-data"><strong>No sessions yet</strong>Log a session to see your progress here.</div>`;
    return;
  }

  const points = data.map(s => ({
    date: s.date,
    maxWeight: Math.max(...s.sets.map(x => parseFloat(x.weight) || 0)),
    totalReps: s.sets.reduce((a, x) => a + (parseInt(x.reps) || 0), 0)
  }));

  const pb = Math.max(...points.map(p => p.maxWeight));
  const cw = 320, ch = 140, pad = { t: 10, r: 10, b: 30, l: 36 };
  const weights = points.map(p => p.maxWeight);
  const minW = Math.min(...weights), maxW2 = Math.max(...weights);
  const range = maxW2 - minW || 1;
  const xStep = (cw - pad.l - pad.r) / Math.max(points.length - 1, 1);
  const toX = i => pad.l + i * xStep;
  const toY = v => pad.t + (ch - pad.t - pad.b) * (1 - (v - minW) / range);

  const polyline = points.map((p, i) => `${toX(i)},${toY(p.maxWeight)}`).join(' ');
  const dots = points.map((p, i) => `<circle cx="${toX(i)}" cy="${toY(p.maxWeight)}" r="4" fill="#c8f135"/>`).join('');
  const xlabels = points.map((p, i) => `<text x="${toX(i)}" y="${ch-4}" text-anchor="middle" font-size="9" fill="#888">${p.date.slice(5)}</text>`).join('');
  const yLabels = [minW, minW+range/2, maxW2].map(v =>
    `<text x="${pad.l-4}" y="${toY(v)+3}" text-anchor="end" font-size="9" fill="#888">${v}kg</text>`).join('');

  const svg = `<svg viewBox="0 0 ${cw} ${ch}" xmlns="http://www.w3.org/2000/svg" style="width:100%;overflow:visible">
    <polyline points="${polyline}" fill="none" stroke="#c8f135" stroke-width="2" stroke-linejoin="round"/>
    ${dots}${xlabels}${yLabels}
  </svg>`;

  const suggestion = savedSuggestions[selectedExercise];
  const suggestionHtml = suggestion ? `
    <div class="chart-container" style="border-color:rgba(77,184,255,0.3);background:var(--info-dim)">
      <div style="font-size:0.68rem;text-transform:uppercase;letter-spacing:0.09em;color:var(--info);margin-bottom:6px;font-weight:600">🤖 Next Session Target</div>
      <div style="font-size:0.88rem;color:var(--text);line-height:1.5">${suggestion}</div>
    </div>` : '';

  const rows = [...data].reverse().map(s => {
    const mW = Math.max(...s.sets.map(x => parseFloat(x.weight) || 0));
    const tR = s.sets.reduce((a, x) => a + (parseInt(x.reps) || 0), 0);
    return `<tr><td>${s.date}</td><td>${mW > 0 ? mW+'kg' : 'BW'}</td><td>${tR}</td><td>Blk ${s.block||'1'}</td></tr>`;
  }).join('');

  detail.innerHTML = `
    ${pb > 0 ? `<div class="pb-badge">🏆 PB: ${pb}kg</div>` : ''}
    ${suggestionHtml}
    <div class="chart-container">
      <div class="chart-title">${selectedExercise}</div>
      <div class="chart-subtitle">Max weight per session (kg)</div>
      ${svg}
    </div>
    <div class="chart-container">
      <div style="font-size:0.9rem;font-weight:600;margin-bottom:12px">Session History</div>
      <table class="history-table">
        <thead><tr><th>Date</th><th>Max Wt</th><th>Reps</th><th>Block</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}
</script>
